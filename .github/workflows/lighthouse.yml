name: Lighthouse CI

on:
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_PRIVY_APP_ID: ''

      - name: Start server
        run: npm run start &
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_PRIVY_APP_ID: ''

      - name: Wait for server
        run: |
          echo "Waiting for server on localhost:3000..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 > /dev/null 2>&1 && echo "Server ready" && break
            echo "Attempt $i failed, retrying in 2s..."
            sleep 2
          done

      - name: Run Lighthouse CI
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Post scores as PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const outputDir = '.lighthouseci';
            const manifestPath = path.join(outputDir, 'manifest.json');
            if (!fs.existsSync(manifestPath)) {
              console.log('No Lighthouse manifest found');
              return;
            }

            const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
            // Keep only representative runs (one per URL)
            const entries = manifest.filter(e => e.isRepresentativeRun);

            const score = (val) => {
              const pct = Math.round((val ?? 0) * 100);
              const icon = pct >= 90 ? '🟢' : pct >= 85 ? '🟡' : '🔴';
              return `${icon} ${pct}`;
            };

            const rows = entries.map(entry => {
              const url = new URL(entry.url).pathname || '/';
              const cats = entry.summary || {};
              return `| \`${url}\` | ${score(cats.performance)} | ${score(cats.accessibility)} | ${score(cats['best-practices'])} | ${score(cats.seo)} |`;
            });

            const thresholds = `
            > **Thresholds:** Performance ≥ 85 · Accessibility ≥ 90 · Best Practices ≥ 90 · SEO ≥ 90
            > 🟢 ≥ 90 · 🟡 ≥ 85 · 🔴 < 85
            `.trim().replace(/^ {12}/gm, '');

            const body = [
              '## Lighthouse CI Results',
              '',
              '| Page | Performance | Accessibility | Best Practices | SEO |',
              '|------|------------|--------------|---------------|-----|',
              ...rows,
              '',
              thresholds,
            ].join('\n');

            // Find existing bot comment and update it, or create a new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.startsWith('## Lighthouse CI Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
